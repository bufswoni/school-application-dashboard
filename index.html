const types = [...new Set(DATA.map(d=>d.type))].sort();
regions.forEach(r => { const o=document.createElement('option'); o.value=r; o.textContent=r; document.getElementById('filterRegion').appendChild(o); });

function applyFilters() {
  const reg = document.getElementById('filterRegion').value;
  const typ = document.getElementById('filterType').value;

  filtered = DATA.filter(d => (!reg || d.region===reg) && (!typ || d.type===typ) && (!q || d.school.toLowerCase().includes(q)));

}
document.getElementById('filterRegion').onchange = applyFilters;
document.getElementById('filterType').onchange = applyFilters;
document.getElementById('filterSearch').oninput = applyFilters;
document.getElementById('pageSize').onchange = function() {

};

function doSort() {
  filtered.sort((a,b) => {
    let va=a[sortCol], vb=b[sortCol];
    if(typeof va==='string') { va=va.toLowerCase(); vb=vb.toLowerCase(); }
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;

}

    const col = th.dataset.col;
    if(sortCol===col) sortDir = sortDir==='asc'?'desc':'asc';
    else { sortCol=col; sortDir=th.dataset.type==='num'?'desc':'asc'; }
    document.querySelectorAll('#mainTable th').forEach(h=>h.classList.remove('sorted-asc','sorted-desc'));
    th.classList.add(sortDir==='asc'?'sorted-asc':'sorted-desc');
    doSort(); renderTable();
  };
});

function chg(v) { return v>0?`<span class="change-pos">+${v}</span>`:v<0?`<span class="change-neg">${v}</span>`:`<span>${v}</span>`; }
function rankBadge(r) {
  const cls = r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':r<=10?'rank-top10':'rank-n';
  return `<span class="rank-badge ${cls}">${r}</span>`;
}
function tagHtml(t) { return `<span class="tag tag-${t}">${t}</span>`; }

function getPageSize() { return pageSize >= 100 ? filtered.length : pageSize; }

function renderTable() {
  const ps = getPageSize();
  const start = (currentPage - 1) * ps;
  const pageData = filtered.slice(start, start + ps);
  const tb = document.getElementById('tableBody');
  tb.innerHTML = pageData.map(d => `<tr>
    <td>${rankBadge(d.rank)}</td>
    <td style="font-weight:600">${d.school}</td>
    <td>${d.region.replace('광역시','').replace('특별시','').replace('특별자치시','').replace('특별자치도','')}</td>
    <td>${tagHtml(d.type)}</td>
    <td>${d.a24}</td><td>${d.r24}</td>
    <td>${d.a25}</td><td>${d.r25}</td>
    <td style="font-weight:600">${d.a26}</td><td style="font-weight:600">${d.r26}</td>
    <td style="font-weight:700">${d.total_a}</td><td style="font-weight:700">${d.total_r}</td>
    <td>${chg(d.diff_a)}</td><td>${chg(d.diff_r)}</td>
  </tr>`).join('');
  renderPagination();
}

function renderPagination() {
  const ps = getPageSize();
  const totalPages = Math.ceil(filtered.length / ps);
  const pag = document.getElementById('pagination');
  const info = document.getElementById('pageInfo');
  const start = (currentPage-1)*ps+1;
  const end = Math.min(currentPage*ps, filtered.length);
  info.textContent = `총 ${filtered.length}개교 중 ${start}~${end}번째 표시`;
  if(totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  if(currentPage > 1) html += `<button onclick="goPage(${currentPage-1})">◀</button>`;
  const sp = Math.max(1, currentPage-3), ep = Math.min(totalPages, currentPage+3);
  if(sp > 1) html += `<button onclick="goPage(1)">1</button>${sp>2?'<span style="padding:0 4px">…</span>':''}`;
  for(let i=sp; i<=ep; i++) html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if(ep < totalPages) html += `${ep<totalPages-1?'<span style="padding:0 4px">…</span>':''}<button onclick="goPage(${totalPages})">${totalPages}</button>`;
  if(currentPage < totalPages) html += `<button onclick="goPage(${currentPage+1})">▶</button>`;
  pag.innerHTML = html;
}
function goPage(p) { currentPage=p; renderTable(); document.getElementById('mainTable').scrollIntoView({behavior:'smooth',block:'start'}); }

function renderKPI() {
  const d = filtered;
  const ta24=d.reduce((s,x)=>s+x.a24,0), ta25=d.reduce((s,x)=>s+x.a25,0), ta26=d.reduce((s,x)=>s+x.a26,0);
  const tr24=d.reduce((s,x)=>s+x.r24,0), tr25=d.reduce((s,x)=>s+x.r25,0), tr26=d.reduce((s,x)=>s+x.r26,0);
  const diffA=ta26-ta25, diffR=tr26-tr25;
  const pctA=ta25?((ta26/ta25-1)*100).toFixed(1):0;
  const pctR=tr25?((tr26/tr25-1)*100).toFixed(1):0;
  const regRate26=ta26?(tr26/ta26*100).toFixed(1):0;
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="label">대상 학교 수</div><div class="value">${d.length}개교</div><div class="sub" style="color:#64748b">전체 Top 100 중</div></div>
    <div class="kpi"><div class="label">2026 총 지원인원</div><div class="value">${ta26.toLocaleString()}명</div><div class="sub ${diffA>=0?'up':'down'}">전년 대비 ${diffA>=0?'+':''}${diffA}명 (${diffA>=0?'+':''}${pctA}%)</div></div>
    <div class="kpi"><div class="label">2026 총 등록인원</div><div class="value">${tr26.toLocaleString()}명</div><div class="sub ${diffR>=0?'up':'down'}">전년 대비 ${diffR>=0?'+':''}${diffR}명 (${diffR>=0?'+':''}${pctR}%)</div></div>
    <div class="kpi"><div class="label">2026 등록률</div><div class="value">${regRate26}%</div><div class="sub" style="color:#64748b">등록/지원</div></div>
    <div class="kpi"><div class="label">3개년 누적 지원</div><div class="value">${(ta24+ta25+ta26).toLocaleString()}명</div><div class="sub" style="color:#64748b">'24: ${ta24} → '25: ${ta25} → '26: ${ta26}</div></div>
  `;
}

const COLORS = ['#2563eb','#dc2626','#059669','#d97706','#7c3aed','#db2777','#0891b2','#65a30d','#ea580c','#6366f1'];
let chartTrend, chartReg, chartPie, chartDiff;

function renderCharts() {
  const top10 = [...filtered].sort((a,b)=>b.total_a-a.total_a).slice(0,10);

  if(chartTrend) chartTrend.destroy();
  chartTrend = new Chart(document.getElementById('chartTrend'), {
    type:'line',
    data: {
      labels: ['2024','2025','2026'],
      datasets: top10.map((d,i) => ({
        label: d.school.length>10?d.school.slice(0,10)+'…':d.school,
        data: [d.a24, d.a25, d.a26],
        borderColor: COLORS[i], backgroundColor: COLORS[i]+'22',
        borderWidth: 2.5, pointRadius: 4, tension: 0.3,
      }))
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}}}, scales:{y:{beginAtZero:true,title:{display:true,text:'지원인원(명)'}}} }
  });

  if(chartReg) chartReg.destroy();
  chartReg = new Chart(document.getElementById('chartReg'), {
    type:'bar',
    data: {
      labels: top10.map(d=>d.school.length>8?d.school.slice(0,8)+'…':d.school),
      datasets: [
        { label:'2024 등록', data:top10.map(d=>d.r24), backgroundColor:'#93c5fd' },
        { label:'2025 등록', data:top10.map(d=>d.r25), backgroundColor:'#3b82f6' },
        { label:'2026 등록', data:top10.map(d=>d.r26), backgroundColor:'#1e3a5f' },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}}}, scales:{y:{beginAtZero:true,title:{display:true,text:'등록인원(명)'}},x:{ticks:{font:{size:10}}}} }
  });

  if(chartPie) chartPie.destroy();
  const typeMap = {};
  filtered.forEach(d=>{ typeMap[d.type]=(typeMap[d.type]||0)+d.total_a; });
  const pieLabels = Object.keys(typeMap).sort((a,b)=>typeMap[b]-typeMap[a]);
  const pieColors = ['#2563eb','#f59e0b','#7c3aed','#059669','#db2777','#64748b'];
  chartPie = new Chart(document.getElementById('chartPie'), {
    type:'doughnut',
    data: { labels:pieLabels, datasets:[{data:pieLabels.map(l=>typeMap[l]), backgroundColor:pieColors.slice(0,pieLabels.length), borderWidth:2}] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:12},boxWidth:14}}} }
  });

  if(chartDiff) chartDiff.destroy();
  const sorted = [...filtered].sort((a,b)=>b.diff_a-a.diff_a);
  const diffData = [...sorted.slice(0,5), ...sorted.slice(-5)].filter((v,i,a)=>a.indexOf(v)===i);
  chartDiff = new Chart(document.getElementById('chartDiff'), {
    type:'bar',
    data: {
      labels: diffData.map(d=>d.school.length>10?d.school.slice(0,10)+'…':d.school),
      datasets: [{
        label:'25→26 지원증감',
        data: diffData.map(d=>d.diff_a),
        backgroundColor: diffData.map(d=>d.diff_a>=0?'#3b82f6':'#ef4444'),
        borderRadius: 4,
      }]
    },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{title:{display:true,text:'증감(명)'}},y:{ticks:{font:{size:11}}}} }
  });
}

function renderAll() { renderKPI(); renderTable(); renderCharts(); }
renderAll();
</script>
</body>
</html>
